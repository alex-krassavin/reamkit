name: Release

# Release by hand:
#   1. bump "version" in package.json (and the lockfile), commit
#   2. push a matching tag:  git tag v1.5.0 && git push --follow-tags
# CI re-runs the full gate set, refuses to publish if the tag and package.json
# version disagree, publishes to npm with provenance, then opens a GitHub Release.
#
# Prereleases (a version with a hyphen, e.g. 1.5.0-alpha.1) publish to a
# non-default npm dist-tag, so a plain `npm install reamkit` never pulls one.
#
# One-time npm setup (not done here): claim `reamkit` on npmjs.com, and either
# add an `NPM_TOKEN` repo secret or configure npm Trusted Publishing for this
# repo (then NODE_AUTH_TOKEN can be dropped).

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # create the GitHub Release
  id-token: write # provenance attestation (and tokenless trusted publishing)

# Never run two releases at once; never cancel one mid-publish.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 23
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci

      # Full gates before anything is published.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test:build
      - run: npm test

      # The pushed tag must match the version in package.json.
      - name: Verify tag matches package.json
        id: rel
        run: |
          set -euo pipefail
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match package.json ($PKG)"; exit 1
          fi
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Publish to npm (provenance)
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-*) TAG=$(printf '%s' "$VERSION" | sed -E 's/^[0-9.]+-([A-Za-z]+).*/\1/; t; s/.*/next/') ;;
            *)   TAG=latest ;;
          esac
          echo "Publishing $VERSION to dist-tag '$TAG'"
          npm publish --provenance --access public --tag "$TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        run: |
          set -euo pipefail
          PRE=""
          case "${{ steps.rel.outputs.tag }}" in *-*) PRE="--prerelease" ;; esac
          gh release create "${{ steps.rel.outputs.tag }}" --generate-notes --verify-tag $PRE
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Docs

# Builds the Astro Starlight site (guides + TypeDoc API reference) and deploys it to
# GitHub Pages. Enable Pages with "Source: GitHub Actions" in the repo settings first.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**' # the TypeDoc API reference is generated from the module source
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm
          cache-dependency-path: '**/package-lock.json'

      # Root deps — TypeDoc resolves the API reference from ../src.
      - name: Install module deps
        run: npm ci

      - name: Install docs deps
        working-directory: docs
        run: npm ci

      - name: Build docs site
        working-directory: docs
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
